<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">AI秘書システム ネットワーク構成図</text>
  <text x="480" y="56" text-anchor="middle" font-size="12" fill="#64748b">Raspberry Pi 5 — ずんだもん秘書</text>

  <!-- ===== External Zone (top) ===== -->
  <rect x="30" y="70" width="900" height="120" rx="10" fill="url(#cloudGrad)" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="50" y="92" font-size="11" font-weight="bold" fill="#2563eb">外部ネットワーク (インターネット)</text>

  <!-- External devices -->
  <rect x="60" y="105" width="160" height="60" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="130" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">スマホ / PC</text>
  <text x="140" y="148" text-anchor="middle" font-size="10" fill="#64748b">リモートクライアント</text>

  <!-- Cloudflare -->
  <rect x="340" y="105" width="200" height="60" rx="8" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#ea580c">Cloudflare Tunnel</text>
  <text x="440" y="146" text-anchor="middle" font-size="10" fill="#64748b">cloudflared (Zero Trust)</text>

  <!-- Anthropic API -->
  <rect x="660" y="105" width="180" height="60" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="128" text-anchor="middle" font-size="13" font-weight="bold" fill="#7c3aed">Anthropic API</text>
  <text x="750" y="146" text-anchor="middle" font-size="10" fill="#64748b">api.anthropic.com</text>

  <!-- Arrow: Client → Cloudflare -->
  <line x1="220" y1="135" x2="335" y2="135" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="278" y="128" text-anchor="middle" font-size="9" fill="#2563eb">HTTPS</text>

  <!-- ===== Pi Zone (main box) ===== -->
  <rect x="30" y="210" width="900" height="480" rx="12" fill="url(#piGrad)" stroke="#86efac" stroke-width="2"/>
  <text x="50" y="234" font-size="13" font-weight="bold" fill="#166534">Raspberry Pi 5  (127.0.0.1 — localhost のみ)</text>
  <text x="890" y="234" text-anchor="end" font-size="10" fill="#64748b">aiagent ユーザー</text>

  <!-- Arrow: Cloudflare → Pi -->
  <line x1="440" y1="165" x2="440" y2="205" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="455" y="190" font-size="9" fill="#f97316">暗号化トンネル</text>

  <!-- ===== cloudflared inside Pi ===== -->
  <rect x="360" y="248" width="200" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="270" text-anchor="middle" font-size="12" font-weight="bold" fill="#ea580c">cloudflared</text>
  <text x="460" y="286" text-anchor="middle" font-size="10" fill="#64748b">→ 127.0.0.1:18789</text>

  <!-- ===== OpenClaw ===== -->
  <rect x="320" y="330" width="280" height="80" rx="10" fill="#fff" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">OpenClaw Gateway</text>
  <text x="460" y="375" text-anchor="middle" font-size="11" fill="#555">127.0.0.1:18789</text>
  <text x="460" y="395" text-anchor="middle" font-size="10" fill="#64748b">/v1/chat/completions</text>

  <!-- Arrow: cloudflared → OpenClaw -->
  <line x1="460" y1="298" x2="460" y2="325" stroke="#f97316" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Arrow: OpenClaw → Anthropic -->
  <line x1="600" y1="355" x2="720" y2="185" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="680" y="260" text-anchor="middle" font-size="9" fill="#7c3aed" transform="rotate(-40,680,260)">HTTPS (API)</text>

  <!-- ===== voice-bridge ===== -->
  <rect x="50" y="330" width="220" height="120" rx="10" fill="#fff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="355" text-anchor="middle" font-size="14" font-weight="bold" fill="#0369a1">voice-bridge</text>
  <text x="160" y="375" text-anchor="middle" font-size="10" fill="#555">main_headless.py</text>
  <text x="75" y="400" font-size="10" fill="#64748b">STT: faster-whisper</text>
  <text x="75" y="416" font-size="10" fill="#64748b">AI Chat: ai_chat.py</text>
  <text x="75" y="432" font-size="10" fill="#64748b">マイク: mic_capture_linux.py</text>

  <!-- Arrow: voice-bridge → OpenClaw -->
  <line x1="270" y1="370" x2="315" y2="370" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="293" y="363" text-anchor="middle" font-size="9" fill="#16a34a">:18789</text>

  <!-- ===== VOICEVOX ===== -->
  <rect x="50" y="490" width="220" height="80" rx="10" fill="#fff" stroke="#e11d48" stroke-width="2" filter="url(#shadow)"/>
  <text x="160" y="518" text-anchor="middle" font-size="14" font-weight="bold" fill="#be123c">VOICEVOX Engine</text>
  <text x="160" y="538" text-anchor="middle" font-size="11" fill="#555">127.0.0.1:50021</text>
  <text x="160" y="555" text-anchor="middle" font-size="10" fill="#64748b">ずんだもん (speaker_id=3)</text>

  <!-- Arrow: voice-bridge → VOICEVOX -->
  <line x1="160" y1="450" x2="160" y2="485" stroke="#e11d48" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="472" font-size="9" fill="#e11d48">:50021</text>

  <!-- ===== USB Audio ===== -->
  <rect x="50" y="610" width="220" height="55" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="635" text-anchor="middle" font-size="12" font-weight="bold" fill="#a16207">USB スピーカーフォン</text>
  <text x="160" y="652" text-anchor="middle" font-size="10" fill="#64748b">マイク入力 + スピーカー出力</text>

  <!-- Arrow: VOICEVOX → Speaker -->
  <line x1="120" y1="570" x2="120" y2="605" stroke="#ca8a04" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="105" y="592" font-size="9" fill="#ca8a04">WAV</text>

  <!-- Arrow: Speaker → voice-bridge -->
  <line x1="200" y1="610" x2="200" y2="450" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="215" y="535" font-size="9" fill="#0ea5e9">音声</text>

  <!-- ===== OpenClaw workspace ===== -->
  <rect x="650" y="330" width="250" height="110" rx="10" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="775" y="355" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">OpenClaw ワークスペース</text>
  <text x="670" y="378" font-size="10" fill="#64748b">~/.openclaw/</text>
  <text x="680" y="396" font-size="10" fill="#555">├ openclaw.json</text>
  <text x="680" y="412" font-size="10" fill="#555">├ SOUL.md (ずんだもん人格)</text>
  <text x="680" y="428" font-size="10" fill="#555">└ workspace/</text>

  <!-- Arrow: OpenClaw → workspace -->
  <line x1="600" y1="370" x2="645" y2="370" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Docker Sandbox ===== -->
  <rect x="650" y="475" width="250" height="90" rx="10" fill="#fff" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="775" y="502" text-anchor="middle" font-size="12" font-weight="bold" fill="#dc2626">Docker Sandbox</text>
  <text x="775" y="522" text-anchor="middle" font-size="10" fill="#555">network: none</text>
  <text x="775" y="538" text-anchor="middle" font-size="10" fill="#555">read_only: true / cap_drop: ALL</text>
  <text x="775" y="554" text-anchor="middle" font-size="10" fill="#64748b">危険処理の隔離実行</text>

  <!-- Arrow: OpenClaw → Docker -->
  <line x1="550" y1="405" x2="680" y2="470" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="630" y="445" font-size="9" fill="#dc2626">ツール実行</text>

  <!-- ===== Tools ===== -->
  <rect x="370" y="450" width="220" height="80" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" filter="url(#shadow)"/>
  <text x="480" y="472" text-anchor="middle" font-size="11" font-weight="bold" fill="#475569">秘書ツール</text>
  <text x="385" y="492" font-size="10" fill="#64748b">get_schedule.py  get_todos.py</text>
  <text x="385" y="508" font-size="10" fill="#64748b">add_note.py  check_status.sh</text>
  <text x="385" y="524" font-size="10" fill="#64748b">/opt/ai-secretary/openclaw/tools/</text>

  <!-- Arrow: OpenClaw → Tools -->
  <line x1="460" y1="410" x2="460" y2="445" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Legend ===== -->
  <rect x="650" y="600" width="260" height="80" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="665" y="618" font-size="11" font-weight="bold" fill="#334155">凡例</text>
  <line x1="665" y1="632" x2="695" y2="632" stroke="#16a34a" stroke-width="2"/>
  <text x="702" y="636" font-size="10" fill="#555">ローカル通信 (localhost)</text>
  <line x1="665" y1="650" x2="695" y2="650" stroke="#f97316" stroke-width="2"/>
  <text x="702" y="654" font-size="10" fill="#555">Cloudflare Tunnel (暗号化)</text>
  <line x1="665" y1="668" x2="695" y2="668" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="702" y="672" font-size="10" fill="#555">隔離通信 (Docker sandbox)</text>

  <!-- No external port badge -->
  <rect x="370" y="600" width="240" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="490" y="616" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">外部公開ポートなし</text>
  <text x="490" y="632" text-anchor="middle" font-size="9" fill="#ef4444">全通信 localhost / Tunnel 経由のみ</text>
</svg>
